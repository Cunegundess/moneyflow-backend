apiVersion: v1
kind: ConfigMap
metadata:
  name: auth-middleware-config
  namespace: moneyflow
data:
  # Spring
  SPRING_PROFILES_ACTIVE: "kubernetes"
  LOG_LEVEL: "INFO"

  # Redis (único banco do auth-middleware)
  REDIS_HOST: "redis-service.moneyflow.svc.cluster.local"
  REDIS_PORT: "6379"

  # URLs
  FRONTEND_URL: "http://moneyflow.local"
  CORS_ALLOWED_ORIGINS: "http://localhost:3000,http://moneyflow.local"
