apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-middleware
  namespace: moneyflow
  labels:
    app: auth-middleware
    component: microservice
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth-middleware
  template:
    metadata:
      labels:
        app: auth-middleware
    spec:
      containers:
        - name: auth-middleware
          image: moneyflow/auth-middleware:latest
          imagePullPolicy: Never # Para Kind
          ports:
            - name: http
              containerPort: 8080

          # ConfigMap
          envFrom:
            - configMapRef:
                name: auth-middleware-config

          # Secrets
          env:
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: auth-middleware-secrets
                  key: REDIS_PASSWORD

          # Health Checks - UPDATED
          livenessProbe:
            httpGet:
              path: /api/auth/actuator/health
              port: http
            initialDelaySeconds: 120 # Give plenty of time for startup
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3

          readinessProbe:
            httpGet:
              path: /api/auth/actuator/health
              port: http
            initialDelaySeconds: 45 # Wait for app to be fully started
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3

          startupProbe:
            httpGet:
              path: /api/auth/actuator/health
              port: http
            initialDelaySeconds: 30 # Start checking after 30 seconds
            periodSeconds: 10 # Check every 10 seconds
            timeoutSeconds: 5
            failureThreshold: 18 # Allow up to 3 minutes for startup (30 + 10*18 = 210s)

          resources:
            requests:
              memory: "512Mi" # Increased from 256Mi
              cpu: "200m" # Increased from 100m
            limits:
              memory: "1Gi" # Increased from 512Mi
              cpu: "500m" # Increased from 250m

          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            allowPrivilegeEscalation: false
